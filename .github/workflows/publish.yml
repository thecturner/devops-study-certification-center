name: Publish Container

on:
  workflow_call:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build, Attest, Push Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Validate ECR configuration
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
        run: |
          test -n "$AWS_REGION" || (echo "Repository variable AWS_REGION is required." && exit 1)
          test -n "$ECR_REPOSITORY" || (echo "Repository variable ECR_REPOSITORY is required." && exit 1)

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Resolve AWS account ID
        id: aws
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78 # v2

      - name: Normalize image name
        id: image
        run: echo "name=${{ steps.aws.outputs.account_id }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image
        id: build_push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: APP_SHA=${{ github.sha }}

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: 'v2.4.3'

      - name: Sign image (keyless, TSA timestamp)
        run: |
          cosign sign --yes \
            --tlog-upload=false \
            --timestamp-server-url https://timestamp.sigstore.dev/api/v1/timestamp \
            "${{ steps.image.outputs.name }}@${{ steps.build_push.outputs.digest }}"

      - name: Attach SLSA provenance attestation
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          DIGEST: ${{ steps.build_push.outputs.digest }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_REF: ${{ github.ref }}
          GH_SHA: ${{ github.sha }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          PREDICATE=$(cat <<EOF
          {
            "buildType": "https://slsa.dev/provenance/v0.2",
            "builder": {
              "id": "https://github.com/${GH_REPOSITORY}/.github/workflows/publish.yml@${GH_REF}"
            },
            "invocation": {
              "configSource": {
                "uri": "git+https://github.com/${GH_REPOSITORY}.git@${GH_REF}",
                "digest": { "sha1": "${GH_SHA}" },
                "entryPoint": ".github/workflows/publish.yml"
              },
              "parameters": {},
              "environment": {
                "github_event_name": "${GH_EVENT_NAME}",
                "github_run_id": "${GH_RUN_ID}",
                "github_run_attempt": "${GH_RUN_ATTEMPT}"
              }
            },
            "materials": [
              {
                "uri": "git+https://github.com/${GH_REPOSITORY}.git",
                "digest": { "sha1": "${GH_SHA}" }
              }
            ]
          }
          EOF
          )
          echo "$PREDICATE" | cosign attest --yes \
            --tlog-upload=false \
            --timestamp-server-url https://timestamp.sigstore.dev/api/v1/timestamp \
            --type slsaprovenance \
            --predicate /dev/stdin \
            "$IMAGE@$DIGEST"

      - name: Scan pushed image with Trivy
        uses: aquasecurity/trivy-action@1f0aa582c8c8f5f7639610d6d38baddfea4fdcee # v0.9.2
        with:
          image-ref: ${{ steps.image.outputs.name }}:latest
          format: table
          ignore-unfixed: true
          vuln-type: os
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Summarize published image
        if: success()
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          DIGEST: ${{ steps.build_push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          EVENT: ${{ github.event_name }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
        run: |
          SHORT_SHA="${SHA:0:7}"

          # Extract PR number from merge commit message, e.g. "fix: something (#18)"
          PR_NUM=$(echo "$COMMIT_MSG" | grep -oP '#\K[0-9]+' | tail -1 || true)

          # Image size from ECR (credentials already configured)
          SIZE_BYTES=$(aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids "imageDigest=${DIGEST}" \
            --query 'imageDetails[0].imageSizeInBytes' \
            --output text 2>/dev/null || echo "0")
          if [ "$SIZE_BYTES" = "None" ] || [ "$SIZE_BYTES" = "0" ]; then
            SIZE_DISPLAY="unknown"
          else
            SIZE_DISPLAY=$(awk "BEGIN {printf \"%.1f MB\", ${SIZE_BYTES}/1048576}")
          fi

          # Certificate identity used for signing and attestation
          CERT_IDENTITY="https://github.com/${WORKFLOW_REF}"

          echo "::notice title=Container image published::${IMAGE}@${DIGEST}"

          {
            echo "## Container Image Published"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| **Registry** | \`${IMAGE%%/*}\` |"
            echo "| **Repository** | \`${IMAGE#*/}\` |"
            echo "| **Digest** | \`${DIGEST}\` |"
            echo "| **Image size** | ${SIZE_DISPLAY} |"
            echo "| **Commit** | \`${SHORT_SHA}\` |"
            if [ -n "$PR_NUM" ]; then
              echo "| **Pull request** | [#${PR_NUM}](https://github.com/${{ github.repository }}/pull/${PR_NUM}) |"
            fi
            echo "| **Actor** | \`${ACTOR}\` |"
            echo "| **Trigger** | \`${EVENT}\` |"
            echo "| **Builder** | \`${WORKFLOW_REF}\` |"
            echo "| **Signed** | Yes — TSA: \`timestamp.sigstore.dev\` |"
            echo "| **SLSA attestation** | Attached (\`slsaprovenance\`) |"
            echo "| **Trivy scan** | Passed — 0 unfixed CRITICAL or HIGH |"
            echo "| **Run** | [View run](${RUN_URL}) |"
            echo ""
            echo "### Tags"
            echo "\`\`\`"
            echo "${TAGS}"
            echo "\`\`\`"
            echo ""
            echo "### Pull by digest"
            echo "\`\`\`bash"
            echo "docker pull ${IMAGE}@${DIGEST}"
            echo "\`\`\`"
            echo ""
            echo "### Verify signature"
            echo "\`\`\`bash"
            echo "cosign verify \\"
            echo "  --certificate-identity \"${CERT_IDENTITY}\" \\"
            echo "  --certificate-oidc-issuer \"https://token.actions.githubusercontent.com\" \\"
            echo "  --insecure-ignore-tlog \\"
            echo "  \"${IMAGE}@${DIGEST}\""
            echo "\`\`\`"
            echo ""
            echo "### Verify SLSA provenance"
            echo "\`\`\`bash"
            echo "cosign verify-attestation \\"
            echo "  --type slsaprovenance \\"
            echo "  --certificate-identity \"${CERT_IDENTITY}\" \\"
            echo "  --certificate-oidc-issuer \"https://token.actions.githubusercontent.com\" \\"
            echo "  --insecure-ignore-tlog \\"
            echo "  \"${IMAGE}@${DIGEST}\""
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
